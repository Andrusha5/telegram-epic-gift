<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BestGifts</title>
    <link rel="stylesheet" href="/css/style.css?v=9.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div id="toast-container" class="toast-container"></div>

        <!-- Кнопка баланса в углу -->
        <div id="balance-pill" class="top-right-balance">
            <span id="user-balance-pill">0.000 GRAM</span>
        </div>

        <div id="custom-modal" class="modal-overlay hidden">
            <div class="modal-card">
                <button id="modal-close-btn" class="modal-close-x">&times;</button>
                <div id="modal-icon" class="modal-icon-glow">🎁</div>
                <h3 id="modal-title"></h3>
                <p id="modal-message"></p>
                <div id="modal-actions" class="modal-buttons-layout"></div>
            </div>
        </div>

        <section id="home-section">
            <header class="header">
                <div class="brand-title">🎁 BestGifts</div>
                <div class="user-profile">
                    <img id="user-avatar" class="user-avatar" src="" alt="">
                    <span id="user-username" class="user-username">Загрузка...</span>
                </div>
            </header>
            <main class="main-content">
                <div class="welcome-banner">
                    <h2>Добро пожаловать!</h2>
                    <p>Открывай кейсы и выигрывай GRAM!</p>
                </div>
                <div class="section-divider-title">Кейсы</div>
                <div class="cases-layout">
                    <div id="daily-case-banner" class="case-banner-card">
                        <div class="case-banner-badge">БЕСПЛАТНО</div>
                        <img src="/Images/Items/pack.jpg" class="case-banner-img">
                        <h3>Ежедневный</h3>
                        <p id="home-case-status">Доступно</p>
                    </div>
                    <div id="newbie-case-banner" class="case-banner-card">
                        <div class="case-banner-badge">НОВЫЙ</div>
                        <img src="/Images/Items/hat.jpg" class="case-banner-img">
                        <h3>Новичок</h3>
                        <p>Бесплатно</p>
                    </div>
                </div>
            </main>
        </section>

        <section id="case-section" class="hidden">
            <header class="header-nav">
                <button id="back-to-home-button" class="back-button">← Назад</button>
                <div class="nav-title" id="case-page-title">Кейс</div>
            </header>
            <main class="main-content">
                <div class="roulette-wrapper">
                    <div class="roulette-pointer pointer-top"></div>
                    <div class="roulette-container"><div id="roulette-track" class="roulette-track"></div></div>
                    <div class="roulette-pointer pointer-bottom"></div>
                </div>
                <div class="case-control-area">
                    <button id="spin-case-button" class="action-button-gradient">Запустить</button>
                    <div id="timer-container" class="timer-card hidden">
                        <div id="daily-case-timer" class="timer-clock">00:00:00</div>
                    </div>
                </div>
                <div id="rewards-section-container" class="rewards-section">
                    <div id="rewards-grid" class="rewards-grid"></div>
                </div>
            </main>
        </section>

        <section id="inventory-section" class="hidden">
            <div class="header"><h3>🎒 Инвентарь</h3></div>
            <main class="main-content">
                <div id="inventory-grid" class="rewards-grid"></div>
                <div class="deposit-panel">
                    <h3>📥 Ввод NFT</h3>
                    <div class="deposit-form-row">
                        <select id="deposit-item-select" class="deposit-select"></select>
                        <button id="deposit-confirm-button" class="deposit-btn-confirm">Подтвердить</button>
                    </div>
                </div>
            </main>
        </section>

        <section id="rating-section" class="hidden">
            <div class="header"><h3>🏆 Рейтинг</h3></div>
            <main class="main-content">
                <div class="empty-inventory">Скоро...</div>
            </main>
        </section>

        <nav id="bottom-navigation" class="bottom-nav">
            <div class="nav-tab" data-target="inventory">📦 Инвентарь</div>
            <div class="nav-tab active" data-target="home">🏠 Меню</div>
            <div class="nav-tab" data-target="rating">🏆 Рейтинг</div>
        </nav>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/js/app.js?v=9.0"></script>
</body>
                            </html>
