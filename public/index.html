<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram BestGifts App</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключение Telegram Web Apps SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div class="app-container">
        <!-- Шапка профиля и Баланс -->
        <header class="app-header">
            <div class="user-profile">
                <img id="user-avatar" src="https://img.icons8.com/color/96/user-male-circle.png" alt="Avatar" class="avatar">
                <div class="user-info">
                    <span id="user-name" class="username">Загрузка...</span>
                    <span class="status">Игрок</span>
                </div>
            </div>
            <div class="balance-container">
                <img src="https://img.icons8.com/color/96/coins.png" alt="TON" class="currency-icon">
                <span id="user-balance">0.00</span> <span class="currency-ticker">TON</span>
            </div>
        </header>

        <!-- Главный контент / Кейс -->
        <main class="main-content">
            <div class="case-card">
                <div class="case-banner">
                    <div class="case-glow"></div>
                    <span class="case-badge">Ежедневный</span>
                    <img src="https://img.icons8.com/color/144/gift-box.png" alt="Daily Case" class="case-image">
                </div>
                <h2>Бесплатный Кейс призов</h2>
                <p class="case-description">Открывайте кейс каждый день и выигрывайте ценные подарки или TON на баланс!</p>
                
                <button id="open-case-btn" class="btn btn-primary btn-lg">
                    <span class="btn-text">Открыть бесплатно</span>
                </button>
                <div id="cooldown-timer" class="cooldown-text hidden">Следующее открытие через: <span id="timer-val">24:00:00</span></div>
            </div>

            <!-- Раздел Инвентаря -->
            <section class="inventory-section">
                <h3>Ваш инвентарь</h3>
                <div id="inventory-grid" class="inventory-grid">
                    <!-- Предметы будут добавляться динамически через app.js -->
                    <div class="empty-inventory">Здесь пока ничего нет. Откройте кейс!</div>
                </div>
            </section>
        </main>
    </div>

    <!-- Новые элементы для всплывающих уведомлений (Тосты) -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Кастомное интерактивное модальное окно -->
    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-window">
            <button id="modal-close-btn" class="modal-close">&times;</button>
            <div id="modal-icon" class="modal-icon">🎁</div>
            <h3 id="modal-title" class="modal-title">Поздравляем!</h3>
            <p id="modal-message" class="modal-message">Вы выиграли предмет.</p>
            <div id="modal-actions" class="modal-actions">
                <!-- Кнопки (Продать / Оставить) генерируются в app.js -->
            </div>
        </div>
    </div>

    <!-- Подключение вашей логики приложения -->
    <script src="app.js"></script>
</body>
    </html>
