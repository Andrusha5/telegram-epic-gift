<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Epic Gift</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="user-profile">
                <img id="user-avatar" class="user-avatar" src="" alt="Avatar">
                <span id="user-username">Загрузка...</span>
            </div>
            <div class="balance-info">
                Баланс: <span id="user-balance">0.000 TON</span>
            </div>
        </header>

        <main class="main-content">
            <section id="home-section">
                <h2>Ежедневный кейс</h2>
                <div class="case-card">
                    <img src="https://img.icons8.com/color/96/treasure-chest.png">
                    <button id="open-daily-case-button" class="primary-button">Открыть</button>
                    <p id="daily-case-timer"></p>
                </div>
            </section>
        </main>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
